<svg width="1024" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bgGradient)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="400" r="150" fill="white" fill-opacity="0.05"/>
  <circle cx="900" cy="100" r="200" fill="white" fill-opacity="0.05"/>
  <circle cx="500" cy="450" r="100" fill="white" fill-opacity="0.03"/>

  <!-- App Icon -->
  <g transform="translate(150, 150)" filter="url(#shadow)">
    <rect width="200" height="200" rx="40" fill="white"/>
    <g transform="translate(30, 30)">
      <!-- Chat bubble -->
      <path d="M70 0C31.34 0 0 31.34 0 70c0 38.66 31.34 70 70 70c11.52 0 22.4-2.79 32-7.72L140 140l-7.72-38c4.93-9.6 7.72-20.48 7.72-32C140 31.34 108.66 0 70 0z" fill="#8B5CF6"/>
      <!-- Dots -->
      <circle cx="45" cy="70" r="12" fill="white"/>
      <circle cx="70" cy="70" r="12" fill="white"/>
      <circle cx="95" cy="70" r="12" fill="white"/>
    </g>
  </g>

  <!-- App Name -->
  <text x="400" y="220" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white">Co-Talk</text>

  <!-- Tagline -->
  <text x="400" y="290" font-family="Arial, sans-serif" font-size="28" fill="white" fill-opacity="0.9">빠르고 안전한 실시간 메시징</text>

  <!-- Feature highlights -->
  <g transform="translate(400, 340)">
    <!-- Chat icon -->
    <g transform="translate(0, 0)">
      <circle cx="20" cy="20" r="20" fill="white" fill-opacity="0.2"/>
      <text x="20" y="27" font-size="20" text-anchor="middle" fill="white">💬</text>
      <text x="55" y="27" font-family="Arial, sans-serif" font-size="18" fill="white">실시간 채팅</text>
    </g>

    <!-- Group icon -->
    <g transform="translate(180, 0)">
      <circle cx="20" cy="20" r="20" fill="white" fill-opacity="0.2"/>
      <text x="20" y="27" font-size="20" text-anchor="middle" fill="white">👥</text>
      <text x="55" y="27" font-family="Arial, sans-serif" font-size="18" fill="white">그룹 채팅</text>
    </g>

    <!-- Notification icon -->
    <g transform="translate(360, 0)">
      <circle cx="20" cy="20" r="20" fill="white" fill-opacity="0.2"/>
      <text x="20" y="27" font-size="20" text-anchor="middle" fill="white">🔔</text>
      <text x="55" y="27" font-family="Arial, sans-serif" font-size="18" fill="white">푸시 알림</text>
    </g>
  </g>
</svg>
