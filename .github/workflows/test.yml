name: Test & Analyze

on:
  # 빌드 워크플로우에서 재사용 호출(main push/dispatch 경로)
  workflow_call:
    inputs:
      flutter_version:
        required: false
        type: string
        default: '3.32.2'
  # PR에서 직접 게이트: 테스트/analyze가 머지 전에 반드시 통과해야 한다.
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # pull_request 트리거에서는 inputs가 비므로 기본 버전으로 폴백한다.
          flutter-version: ${{ inputs.flutter_version || '3.32.2' }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run analyzer
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test
